<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planar Arm Control</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/sidebar_right.css" />

    <!-- Scripts -->
    <script type="text/javascript" src="/eel.js"></script>
    <script type="module" src="js/main.js" defer></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                RoboControl
            </div>

            <div class="control-group">
                <div class="group-title">Connection</div>
                <div class="status-indicator">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="status-text">Disconnected</span>
                </div>
                <button id="start-serial-btn" class="btn">Connect Serial</button>
            </div>

            <!-- Application Mode Switcher -->
            <div class="control-group">
                <div class="group-title">Application Mode</div>
                <div style="display: flex; gap: 5px;">
                    <button id="app-mode-text" class="btn" title="Enable Text Generation">🖋</button>
                    <button id="app-mode-drawing" class="btn active" title="Enable Manual Drawing">✒</button>
                    <button id="app-mode-image" class="btn" title="Enable Image to Trajectory">🖼️</button>

                </div>

                <!-- Action Buttons (Undo/Redo/Clear) - Available in all modes -->
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px;">
                    <button id="undo-btn" class="btn sm" title="Undo (Ctrl+Z)">⬅ Undo</button>
                    <button id="redo-btn" class="btn sm" title="Redo (Ctrl+Y)">➡ Redo</button>
                    <button id="clear-btn" class="btn sm" title="Clear Drawing (Delete)">✖ Clear</button>
                </div>
            </div>

            <div id="section-drawing-tools" class="control-group">
                <div class="group-title">DRAWING MODE</div>

                <!-- Drawing Mode -->
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button id="mode-continuous-btn" class="btn active" title="Chain shapes (United)">➕UNIFIED</button>
                    <button id="mode-discrete-btn" class="btn" title="Separate shapes (Discrete)">➗DIVIDED</button>
                </div>

                <!-- Main Drawing Tools -->
                <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px;">
                    <button id="tool-line" class="btn active" data-tool="line" title="Linear Tool">➖LINE</button>

                    <button id="tool-square" class="btn" data-tool="square" title="Square Tool">🔳SQUARE</button>
                    <button id="tool-polygon" class="btn" data-tool="polygon" title="Polygon Tool">🛑POLYGON</button>
                    <button id="tool-star" class="btn" data-tool="star" title="Star Tool">✨STAR</button>
                    <button id="tool-circle" class="btn" data-tool="circle" title="Circle Tool">🔴CIRCLE</button>
                    <button id="tool-semicircle" class="btn" data-tool="semicircle"
                        title="Semicircle Tool">🌙SEMICIRCLE</button>
                    <button id="tool-heart" class="btn" data-tool="heart" title="Heart Tool">❤️HEART</button>
                    <button id="tool-spiral" class="btn" data-tool="spiral" title="Spiral Tool">🌀SPIRAL</button>
                    <button id="tool-greek-cross" class="btn" data-tool="greek_cross"
                        title="Greek Cross Tool">✚CROSS</button>
                    <button id="tool-rhombus" class="btn" data-tool="rhombus" title="Rhombus Tool">🔶RHOMBUS</button>
                    <button id="tool-triangle-right" class="btn" data-tool="triangle_right"
                        title="Right Triangle Tool">🔺TRIANGLE</button>
                    <button id="tool-triangle" class="btn" data-tool="triangle"
                        title="Equilateral Triangle Tool">🔺EQUILATERAL TRIANGLE</button>
                    <button id="tool-triangle-scalene" class="btn" data-tool="triangle_scalene"
                        title="Scalene Triangle Tool">🔺SCALENE TRIANGLE</button>
                    <button id="tool-triangle-isosceles" class="btn" data-tool="triangle_isosceles"
                        title="Isosceles Triangle Tool">🔺ISOSCELES TRIANGLE</button>


                </div>
            </div>

            <div id="section-text-tools" class="control-group">
                <div class="group-title">TEXT MODE</div>

                <button id="btn-preset-letter" class="btn sm"
                    style="width: 100%; margin-bottom: 8px; justify-content: center;">📩LETTER.mod</button>



                <textarea id="text-input" placeholder="Enter text..." class="input-full" rows="1"></textarea>

                <div class="input-row">
                    <label>Size:</label>
                    <input type="number" id="font-size" value="0.05" step="0.005" class="input-sm">
                </div>

                <!-- Linear Controls -->
                <div id="linear-controls">
                    <div class="input-row">
                        <label>Position X:</label> <input type="number" id="lin-x" value="0.22" step="0.01">
                    </div>
                    <div class="input-row">
                        <label>Position Y:</label> <input type="number" id="lin-y" value="0.17" step="0.01">
                    </div>
                    <div class="input-row">
                        <label>Angle:</label> <input type="number" id="lin-angle" value="-90" step="5">
                    </div>
                </div>

                <!-- Curved Controls -->
                <div id="curved-controls" class="hidden">
                    <div class="input-row">
                        <label>Radius:</label> <input type="number" id="curv-radius" value="0.25" step="0.01">
                    </div>
                    <div class="input-row">
                        <label>Offset:</label> <input type="number" id="curv-offset" value="90" step="5">
                    </div>
                </div>

                <div id="text-warning" class="warning-msg hidden">⚠ Text exceeds workspace!</div>

                <!-- Add Text Button -->
                <button id="btn-add-text" class="btn primary" style="width: 100%; margin-top: 10px;">
                    ➕ AGGIUNGI TESTO
                </button>

                <div style="height: 10px;"></div>
            </div>

            <div id="section-image-tools" class="control-group">
                <div class="group-title">IMAGE MODE</div>

                <div class="input-row">
                    <label>File:</label>
                    <input type="file" id="image-upload"
                        accept=".jpg, .jpeg, .png, .bmp, .tiff, .tif, .gif, .webp, .svg" class="input-sm"
                        style="width: 100%;">
                </div>

                <!-- Preview Box -->
                <div id="image-preview-container"
                    style="width: 100%; height: 150px; background: #222; border: 1px solid #444; margin: 10px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;">
                    <span style="color: #666; font-size: 0.8rem;">Preview</span>
                    <img id="image-preview-img" style="max-width: 100%; max-height: 100%; display: none;">
                </div>

                <!-- Controls -->
                <div class="input-row">
                    <label>Width (m):</label> <input type="number" id="img-width" value="0.10" step="0.01">
                </div>
                <div class="input-row">
                    <label>Pos X:</label> <input type="number" id="img-x" value="0.20" step="0.01">
                </div>
                <div class="input-row">
                    <label>Pos Y:</label> <input type="number" id="img-y" value="0.00" step="0.01">
                </div>
                <div class="input-row">
                    <label>Rotation:</label> <input type="number" id="img-rotation" value="0" step="5">
                </div>

                <!-- Raster Options -->
                <div id="raster-options" style="margin-top: 5px; border-top: 1px solid #333; padding-top: 5px;">
                    <div class="input-row">
                        <label>Threshold:</label> <input type="number" id="img-threshold" value="100" step="10"
                            title="Canny Threshold">
                    </div>
                </div>

                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button id="btn-process-image" class="btn primary" style="flex: 1;"
                        title="Process & Preview">PROCESS</button>
                    <button id="btn-confirm-image" class="btn success" style="flex: 1;"
                        title="Add to Canvas">CONFIRM</button>
                </div>

                <!-- Debug Output -->
                <div id="image-debug-log" class="hidden"
                    style="margin-top: 10px; font-family: monospace; font-size: 0.7rem; color: #888; background: #222; padding: 5px; border-radius: 4px; max-height: 100px; overflow-y: auto;">
                    <!-- Logs will appear here -->
                </div>

                <div style="height: 10px;"></div>
            </div>





            <div class="control-group">
                <div class="group-title">Trajectory Control</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button id="send-trajectory-btn" class="btn primary" title="Generate & Send Trajectory">Generate
                        Trajectory</button>
                    <button id="stop-trajectory-btn" class="btn" style="background-color: #ac3528; color: white;"
                        title="EMERGENCY STOP">STOP</button>
                    <button id="homing-btn" class="btn" title="Return to Home">Homing</button>
                    <button id="clean-state-btn" class="btn" title="Clean State">Clean</button>
                </div>
            </div>

            <div id="console-output" style="margin-top: auto; font-size: 0.8em; color: var(--text-muted);">
                <!-- Logs can go here -->
            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="main-content">
            <canvas id="input_canvas" width="700" height="700"></canvas>
        </main>
        <!-- Right Sidebar -->
        <div id="right-sidebar" class="right-sidebar">
            <div class="sidebar-header">
                <h3>Customization</h3>
                <button id="close-right-sidebar-btn" class="icon-btn">×</button>
            </div>
            <div class="sidebar-content">
                <!-- GUI Color User (Moved Here) -->
                <div class="control-group">
                    <div class="group-title">GUI COLOR USER</div>
                    <div id="theme-buttons-container" class="theme-buttons-row">
                        <!-- Dynamic Buttons injected by theme.js -->
                    </div>
                </div>

                <!-- Workspace Geometry Section (Moved Here) -->
                <div class="control-group">
                    <div class="group-title">Workspace Geometry</div>
                    <div class="toggle-row">
                        <button id="mode-linear-btn" class="btn active sm">Linear</button>
                        <button id="mode-curved-btn" class="btn sm">Curved</button>
                    </div>

                    <!-- Linear Workspace Controls -->
                    <div id="linear-ws-controls" style="margin-top: 10px;">
                        <div class="input-row">
                            <label>Sheet X:</label><input type="number" id="ws-x" value="0.05" step="0.01">
                        </div>
                        <div class="input-row">
                            <label>Sheet Y:</label><input type="number" id="ws-y" value="-0.15" step="0.01">
                        </div>
                        <div class="input-row">
                            <label>Length:</label><input type="number" id="ws-w" value="0.20" step="0.01">
                        </div>
                        <div class="input-row">
                            <label>Height:</label><input type="number" id="ws-h" value="0.30" step="0.01">
                        </div>
                    </div>

                    <!-- Curved Workspace Controls -->
                    <div id="curved-ws-controls" class="hidden" style="margin-top: 10px;">
                        <div class="input-row">
                            <label>Inner R:</label><input type="number" id="ws-inner-r" value="0.12" step="0.01">
                        </div>
                        <div class="input-row">
                            <label>Outer R:</label><input type="number" id="ws-outer-r" value="0.33" step="0.01">
                        </div>
                    </div>

                    <!-- Grid Options -->
                    <div style="margin-top: 10px;">
                        <button id="grid-toggle-btn" class="btn sm" title="Toggle Grid (G)">⊞ Grid: OFF</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Sidebar Toggle Button -->
        <button id="right-sidebar-toggle-btn" class="floating-toggle-btn" title="Open Menu">
            ☰
        </button>


    </div>
</body>

</html>
